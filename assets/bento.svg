  </g>
  <rect x="860.5" y="0.5" width="419" height="157" rx="22" fill="none" stroke="#1E1E24"/>
  <g fill="none" stroke="#7FD3F5" stroke-opacity="0.7">
    <circle cx="1210" cy="46" r="26"/>
