  <rect x="860.5" y="182.5" width="419" height="157" rx="22" fill="none" stroke="#1E1E24"/>
  <path d="M1210 210 l7.6 15.4 17 2.5 -12.3 12 2.9 16.9 -15.2 -8 -15.2 8 2.9 -16.9 -12.3 -12 17 -2.5 Z"
