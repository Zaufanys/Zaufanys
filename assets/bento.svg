  <text x="892" y="120" font-size="21" font-weight="700" letter-spacing="2" fill="#E6E6EC">ALWAYS LEARNING</text>
  <text x="892" y="52" font-size="12" font-weight="600" letter-spacing="3" fill="#7A7A83">STATUS</text>

