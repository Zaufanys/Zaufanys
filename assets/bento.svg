  <text x="892" y="302" font-size="21" font-weight="700" letter-spacing="2" fill="#E6E6EC">CRAFT MATTERS</text>
  <text x="892" y="234" font-size="12" font-weight="600" letter-spacing="3" fill="#7A7A83">ETHOS</text>
