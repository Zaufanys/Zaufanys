      <stop offset="100%" stop-color="#0B0B0D" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="cAbout"><rect x="0" y="0" width="836" height="340" rx="22"/></clipPath>
    <clipPath id="cLearn"><rect x="860" y="0" width="420" height="158" rx="22"/></clipPath>
    <clipPath id="cCraft"><rect x="860" y="182" width="420" height="158" rx="22"/></clipPath>
  </defs>

  <!-- ABOUT -->
  <g clip-path="url(#cAbout)">
    <rect x="0" y="0" width="836" height="340" fill="#0B0B0D"/>
    <rect x="0" y="0" width="836" height="340" fill="url(#aboutGlow)"/>
  </g>
  <rect x="0.5" y="0.5" width="835" height="339" rx="22" fill="none" stroke="#1E1E24"/>
  <text x="44" y="58" font-size="13" font-weight="600" letter-spacing="4" fill="#8A8A93">ABOUT</text>
  <text x="42" y="150" font-size="42" font-weight="800" fill="#F4F4F6">Breaking things</text>
  <text x="42" y="202" font-size="42" font-weight="800" fill="#F4F4F6">to understand them.</text>
  <text x="44" y="286" font-size="16" font-weight="500" letter-spacing="1" fill="#8E8E97"
        font-family="'JetBrains Mono', Consolas, monospace">&gt; open to collaborations</text>
  <rect x="336" y="274" width="11" height="17" fill="#B91C1C"/>

  <!-- LEARNING -->
  <g clip-path="url(#cLearn)">
